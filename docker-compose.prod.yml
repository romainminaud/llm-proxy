# Production overrides - use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  llm-proxy:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    environment:
      - LOG_LEVEL=warn
      - TRUST_PROXY=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
